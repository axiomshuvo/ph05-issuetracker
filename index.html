<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="shortcut icon"
      href="./assets/github-logo.png"
      type="image/x-icon"
    />
    <title>Github Issue Tracker</title>
    <!-- Add Tailwind and DaisyUI CDN  -->
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="./style.css" />
  </head>

  <body class="">
    <header class="hidden bg-base-100 shadow-sm">
      <div class="w-11/12 mx-auto">
        <div class="navbar">
          <div class="flex-1">
            <a class="flex gap-2 font-semibold items-center text-xl" href="">
              <img class="w-10" src="./assets/github-logo.png" alt="" />
              Github Issue Tracker</a
            >
          </div>
          <div class="flex gap-2">
            <form id="search-form" class="join">
              <div>
                <label class="input validator join-item">
                  <input
                    id="searching-text"
                    type="text"
                    placeholder="Search Issue"
                    required
                  />
                </label>
              </div>
              <button class="btn join-item">
                <svg
                  xmlns="http://www.w3.org/2000/svg"
                  class="w-5 h-5 text-gray-500"
                  fill="none"
                  viewBox="0 0 24 24"
                  stroke="currentColor"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="2"
                    d="M21 21l-4.35-4.35m1.85-5.4a7 7 0 11-14 0 7 7 0 0114 0z"
                  />
                </svg>
              </button>
            </form>
            <button class="btn btn-primary">&#x2B; New Issue</button>
          </div>
        </div>
      </div>
    </header>

    <section id="login" class="">
      <div class="container mx-auto">
        <div class="hero min-h-screen">
          <div
            class="hero-content flex-col p-8 bg-base-100 rounded-xl shadow-2xl my-24 min-w-2/5"
          >
            <div class="text-center mx-auto space-y-2.5">
              <figure>
                <img
                  class="w-20 mx-auto"
                  src="./assets/github-logo.png"
                  alt="github-logo"
                />
              </figure>
              <h1 class="text-2xl font-bold">GitHub Issues Tracker</h1>
              <p>Sign in to manage your issues</p>
            </div>

            <div class="card w-full">
              <div class="card-body">
                <form class="fieldset">
                  <fieldset class="fieldset">
                    <label class="label">Username</label>
                    <input
                      value="admin"
                      id="username"
                      type="text"
                      class="input input-md validator w-full"
                      placeholder="username"
                      required
                    />
                    <p class="validator-hint hidden">Default: admin</p>
                  </fieldset>

                  <label class="fieldset">
                    <span class="label">Password</span>
                    <input
                      value="admin123"
                      id="password"
                      type="password"
                      class="input input-md validator w-full"
                      placeholder="Password"
                      required
                    />
                    <span class="validator-hint hidden">Default: admin123</span>
                  </label>

                  <button class="btn btn-md btn-primary mt-4" type="submit">
                    Sign In
                  </button>
                </form>
              </div>
              <div class="flex w-full flex-col text-center">
                <div class="divider">OR</div>
                <p class="text-gray-600 Xsmall">Demo Credentials:</p>
                <div class="bg-base-300 rounded-2xl py-5 mt-2.5">
                  <p><span class="font-bold mr-1">Username:</span>admin</p>
                  <p><span class="font-bold mr-1">Password:</span>admin123</p>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <section id="maincontent" class="hidden">
      <!-- Content -->
      <div id="issue-container">
        <div class="container mx-auto px-4 mt-15">
          <!-- Tabs -->
          <div
            id="issue-tab"
            class="mb-6 p-5 flex gap-3 bg-base-100 rounded-xl [&>button]:px-10"
          >
            <button data-tab="all" class="btn btn-primary">All</button>
            <button data-tab="open" class="btn btn-outline btn-primary">
              Open
            </button>
            <button data-tab="closed" class="btn btn-outline btn-primary">
              Closed
            </button>
          </div>

          <div id="issue-content">
            <!-- Loader -->
            <div
              id="loader"
              class="flex hidden justify-center items-center gap-2 py-10"
            >
              <span
                class="loading loading-ball text-secondary loading-xs"
              ></span>
              <span
                class="loading loading-ball text-secondary loading-sm"
              ></span>
              <span
                class="loading loading-ball text-secondary loading-md"
              ></span>
              <span
                class="loading loading-ball text-secondary loading-lg"
              ></span>
              <span
                class="loading loading-ball text-secondary loading-xl"
              ></span>
            </div>

            <!-- Issue List -->
            <div
              id="issue-list-area "
              class="space-y-4 rounded-2xl bg-base-100 shadow-sm"
            >
              <!-- issue counter & mark -->
              <div
                id="issue-count-area"
                class="flex flex-col sm:flex-row sm:items-center justify-between gap-4 p-4"
              >
                <!-- Left -->
                <div class="flex items-center gap-3">
                  <img
                    src="./assets/aperture.png"
                    alt="Aperture"
                    class="w-10 h-10"
                  />
                  <div>
                    <h3 id="issue-count" class="font-semibold text-lg"></h3>
                    <p class="text-sm text-gray-500">
                      Track and manage your project issues
                    </p>
                  </div>
                </div>

                <!-- Right -->
                <div class="flex items-center gap-6">
                  <!-- Open -->
                  <div class="flex items-center gap-2">
                    <div class="status status-success"></div>
                    <span class="text-sm">Open</span>
                  </div>

                  <!-- Closed -->
                  <div class="flex items-center gap-2">
                    <div class="status bg-purple-500"></div>
                    <span class="text-sm">Closed</span>
                  </div>
                </div>
              </div>

              <div class="divider my-0 gap-0 h-0"></div>
              <div
                id="issue-list-container"
                class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 p-5 bg-[#FBFBFB]"
              >
                <!-- Single Card -->
              </div>
            </div>
          </div>
        </div>
      </div>
    </section>

    <footer
      class="hidden footer footer-horizontal footer-center bg-base-100 p-10"
    >
      <aside>
        <img class="w-16" src="./assets/github-logo.png" alt="github-logo" />
        <p class="font-bold">GitHub Issuer</p>
        <p class="text-sm text-gray-500 text-center">
          © <span id="year"></span> Pradipta Sarker. All rights reserved.
        </p>
      </aside>
      <nav>
        <div class="grid grid-flow-col gap-4">
          <a href="#">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              class="fill-current"
            >
              <path
                d="M24 4.557c-.883.392-1.832.656-2.828.775 1.017-.609 1.798-1.574 2.165-2.724-.951.564-2.005.974-3.127 1.195-.897-.957-2.178-1.555-3.594-1.555-3.179 0-5.515 2.966-4.797 6.045-4.091-.205-7.719-2.165-10.148-5.144-1.29 2.213-.669 5.108 1.523 6.574-.806-.026-1.566-.247-2.229-.616-.054 2.281 1.581 4.415 3.949 4.89-.693.188-1.452.232-2.224.084.626 1.956 2.444 3.379 4.6 3.419-2.07 1.623-4.678 2.348-7.29 2.04 2.179 1.397 4.768 2.212 7.548 2.212 9.142 0 14.307-7.721 13.995-14.646.962-.695 1.797-1.562 2.457-2.549z"
              ></path>
            </svg>
          </a>
          <a href="#">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              class="fill-current"
            >
              <path
                d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"
              ></path>
            </svg>
          </a>
          <a href="#">
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width="24"
              height="24"
              viewBox="0 0 24 24"
              class="fill-current"
            >
              <path
                d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"
              ></path>
            </svg>
          </a>
        </div>
      </nav>
    </footer>

    <!-- Open the modal using ID.showModal() method -->

    <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
    <dialog
      id="issue-modal"
      class="modal modal-bottom sm:modal-middle"
    ></dialog>

    <script src="./script.js"></script>
  </body>
</html>
